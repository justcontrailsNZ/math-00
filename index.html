<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Math Adventure NZ</title>
<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

body {
    font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
    text-align: center;
    margin: 0;
    padding: 15px 10px;
    background: #e9f6ff;
    transition: background 0.5s ease;
    touch-action: manipulation; /* Prevents double-tap zoom on mobile */
}

#gameContainer {
    background: rgba(255, 255, 255, 0.95);
    max-width: 420px;
    margin: 0 auto;
    padding: 25px 15px;
    border-radius: 25px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
}

h1 { margin-top: 0; font-size: 30px; color: #333; }

/* PS5 Bank Styling */
#ps5Bank {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: white;
    padding: 12px 15px;
    border-radius: 15px;
    margin: 0 auto 15px auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    border: 3px solid #fff;
    width: 90%;
    transition: transform 0.2s, background 0.3s;
}
.ps5-text { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
.ps5-mins { color: #00ffcc; font-size: 24px; text-shadow: 0 0 5px rgba(0,255,204,0.5); }
.redeem-btn {
    background: #ff4757; color: white; border: none; padding: 8px 12px;
    border-radius: 10px; font-weight: bold; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 0 #cc0000; font-size: 14px;
}
.redeem-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #cc0000; }

@keyframes pulseBank {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); background: #4CAF50; border-color: #4CAF50;}
    100% { transform: scale(1); }
}
.pulse-anim { animation: pulseBank 0.5s ease; }


.controls-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
}

select, button {
    font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
    font-size: 16px;
    padding: 10px;
    border-radius: 10px;
    border: 2px solid #ccc;
    cursor: pointer;
    outline: none;
    background: white;<span class="ml-2" /><span class="inline-block w-3 h-3 rounded-full bg-neutral-a12 align-middle mb-[0.1rem]" />
